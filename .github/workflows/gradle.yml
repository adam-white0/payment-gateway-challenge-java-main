name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 19
        uses: actions/setup-java@v4
        with:
          java-version: '19'
          distribution: 'corretto'

      - name: Build and test
        run: ./gradlew build
